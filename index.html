<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة نيرا - اكتشف أحدث الفرص الوظيفية</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Tajawal', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- رأس الصفحة -->
  <header class="bg-white shadow p-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <h1 class="text-2xl font-bold text-blue-800">منصة نيرا للوظائف</h1>
      <nav class="space-x-4">
        <a href="#" class="text-blue-600 hover:underline">الرئيسية</a>
        <a href="#" class="text-gray-600 hover:underline">عن المنصة</a>
      </nav>
    </div>
  </header>

  <!-- قسم الهيرو -->
  <section class="bg-blue-600 text-white text-center py-20">
    <h2 class="text-3xl md:text-4xl font-bold mb-4">اكتشف أحدث الفرص الوظيفية المتاحة اليوم</h2>
    <p class="text-lg">نقوم بجمع الوظائف المتوفرة من ReliefWeb لتسهيل وصولك إليها</p>
  </section>

  <!-- قسم الوظائف -->
  <main class="max-w-5xl mx-auto p-4">
    <h3 class="text-2xl font-semibold text-gray-800 mb-6">الوظائف المتاحة في سوريا</h3>
    <div id="job-cards-container" class="grid gap-4">
      <!-- سيتم إدراج البطاقات تلقائيًا هنا -->
    </div>
  </main>

  <!-- تذييل الصفحة -->
  <footer class="text-center text-sm text-gray-500 py-6 border-t mt-12">
    &copy; 2025 منصة نيرا - جميع الحقوق محفوظة
  </footer>

  <!-- كود تحميل الوظائف من reliefweb_jobs.json -->
  <script>
    async function loadJobs() {
      try {
        const response = await fetch('reliefweb_jobs.json');
        const jobs = await response.json();

        const container = document.getElementById('job-cards-container');
        container.innerHTML = '';

        jobs.forEach(job => {
          const card = document.createElement('div');
          card.className = "bg-white border rounded-lg shadow p-4";
          card.innerHTML = `
            <h4 class="text-lg font-bold text-blue-700 mb-1">${job["Job Title"]}</h4>
            <p class="text-gray-600 mb-1">${job["Company"]} — ${job["Location"]}</p>
            <p class="text-sm text-gray-400 mb-2">${job["Date"] || 'تاريخ غير متوفر'}</p>
            <a href="${job["Link"]}" target="_blank" class="inline-block bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">عرض التفاصيل</a>
          `;
          container.appendChild(card);
        });

      } catch (error) {
        document.getElementById('job-cards-container').innerHTML = '<p class="text-red-500">حدث خطأ أثناء تحميل الوظائف.</p>';
        console.error("فشل تحميل الوظائف:", error);
      }
    }

    loadJobs();
  </script>
</body>
</html>
