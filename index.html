<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منصة نيرا للوظائف في سوريا</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

  <header class="bg-white shadow p-4 text-center">
    <h1 class="text-2xl font-bold text-blue-800">أحدث الوظائف</h1>
    <p class="text-gray-600">اكتشف أحدث الفرص الوظيفية المتاحة اليوم</p>
  </header>

  <main class="max-w-4xl mx-auto p-4">
    <div id="job-cards-container">
      <!-- سيتم تحميل الوظائف هنا تلقائيًا -->
    </div>
  </main>

  <footer class="text-center text-sm text-gray-500 py-4">
    &copy; 2025 منصة نيرا - جميع الحقوق محفوظة
  </footer>

  <script>
    async function loadJobs() {
      try {
        const response = await fetch('reliefweb_jobs.json');
        const jobs = await response.json();

        const container = document.getElementById('job-cards-container');
        container.innerHTML = '';

        jobs.forEach(job => {
          const card = `
            <div class="job-card bg-white rounded-lg shadow overflow-hidden border border-gray-100 p-4 mb-4">
              <h3 class="text-xl font-semibold text-blue-800">${job["Job Title"]}</h3>
              <p class="text-gray-600">${job["Company"]} — ${job["Location"]}</p>
              <p class="text-sm text-gray-400">${job["Date"]}</p>
              <a href="${job["Link"]}" target="_blank" class="text-white bg-blue-500 px-4 py-2 rounded mt-2 inline-block">التفاصيل</a>
            </div>
          `;
          container.innerHTML += card;
        });
      } catch (error) {
        console.error("فشل تحميل الوظائف:", error);
        const container = document.getElementById('job-cards-container');
        container.innerHTML = '<p class="text-red-500">فشل تحميل الوظائف. يرجى المحاولة لاحقًا.</p>';
      }
    }

    loadJobs();
  </script>

</body>
</html>
